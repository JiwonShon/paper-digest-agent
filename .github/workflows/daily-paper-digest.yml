name: Daily Paper Digest

on:
  schedule:
    - cron: "0 23 * * *"  # 08:00 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: paper-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.2
        run: |
          python main.py

      - name: Commit outputs
        run: |
          git config user.name "paper-digest-agent"
          git config user.email "paper-digest-agent@users.noreply.github.com"
          git add outputs data
          git diff --cached --quiet && exit 0
          git commit -m "daily paper digest update"
          git push
